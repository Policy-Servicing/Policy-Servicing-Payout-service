# ─────────────────────────────────────────────
#  PolicyServe Backend — application.properties
#  Spring Boot 2.2.7.RELEASE
# ─────────────────────────────────────────────

server.port=8080
server.servlet.context-path=/

spring.application.name=policy-servicing-backend

# ── Oracle DataSource ──
spring.datasource.url=jdbc:oracle:thin:@localhost:1521/ORCLPDB
spring.datasource.username=PS_USER
spring.datasource.password=PS_PASS
spring.datasource.driver-class-name=oracle.jdbc.OracleDriver

# ── JPA / Hibernate ──
spring.jpa.database-platform=org.hibernate.dialect.Oracle12cDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

# ── Quartz ──
spring.quartz.job-store-type=jdbc
spring.quartz.jdbc.initialize-schema=never
spring.quartz.properties.org.quartz.scheduler.instanceName=PolicyServeScheduler
spring.quartz.properties.org.quartz.threadPool.threadCount=10
spring.quartz.properties.org.quartz.jobStore.class=org.quartz.impl.jdbcjobstore.JobStoreTX
spring.quartz.properties.org.quartz.jobStore.driverDelegateClass=org.quartz.impl.jdbcjobstore.oracle.OracleDelegate

# ── JWT ──
app.jwt.secret=CHANGE_THIS_TO_A_256_BIT_SECRET_KEY_FOR_PRODUCTION
app.jwt.expiration-ms=3600000

# ── CORS ──
app.cors.allowed-origins=http://localhost:4200

# ── Actuator ──
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=when-authorized

# ── Logging ──
logging.level.com.policyserve=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

# ── Manual Processing feature flags ──
manual.processing.max-retry-attempts=3
manual.processing.audit-enabled=true

# ── Oracle Package flag ──
# Set to true to delegate stage-counts + drill-down to PKG_PS_DASHBOARD.
# Set to false (default) to use JPA-based logic (useful for dev without Oracle).
app.use-oracle-package=false
